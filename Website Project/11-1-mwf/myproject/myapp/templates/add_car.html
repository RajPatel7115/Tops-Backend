{% extends "header.html" %}
{% load static %}
{% block content %}	
	<div class="menu trans_500">
		<div class="menu_content d-flex flex-column align-items-center justify-content-center text-center">
			<div class="menu_close_container"><div class="menu_close"></div></div>
			<div class="logo menu_logo"><a href="#"><img src="{% static 'images/logo.png' %}" alt=""></a></div>
			<ul>
				<li class="menu_item"><a href="{% url 'index' %}">home</a></li>
				<li class="menu_item"><a href="#">about us</a></li>
				<li class="menu_item"><a href="#">offers</a></li>
				<li class="menu_item"><a href="#">news</a></li>
				<li class="menu_item"><a href="#">contact</a></li>
			</ul>
		</div>
	</div>

	<!-- Home Section -->
	<div class="home">
		<div class="home_background parallax-window" data-parallax="scroll" data-image-src="{% static 'images/contact_background.jpg' %}"></div>
		<div class="home_content">
			<div class="home_title">Add New Car</div>
		</div>
	</div>

	<!-- Add Car Form Section -->
	<div class="contact_form_section">
		<div class="container">
			<div class="row">
				<div class="col">
					<div class="contact_form_container" style="background: linear-gradient(to top right, #31124b, #8d4fff); padding: 50px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
						<div class="d-flex justify-content-between align-items-center" style="border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 15px; margin-bottom: 30px;">
							<h2 style="color: white; font-weight: bold; font-size: 26px; margin: 0;">Add a Car to Your Fleet</h2>
							<a href="{% url 'agency_dashboard' %}" style="background-color: rgba(255,255,255,0.2); border: none; color: white; padding: 10px 20px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; text-transform: uppercase; transition: background 0.2s;">Back to Dashboard</a>
						</div>

						<form action="{% url 'add_car' %}" id="contact_form" class="contact_form text-center" method="post" enctype="multipart/form-data">
							{% csrf_token %}
							
							{% if msg %}
							<div class="alert alert-danger" role="alert" style="margin-bottom: 25px;">
								{{ msg }}
							</div>
							{% endif %}

							<!-- Car Name Input -->
							<input type="text" id="contact_form_name" class="contact_form_subject input_field" placeholder="Car Name (e.g. Toyota Innova)" name="name" required style="margin-bottom: 20px;">

							<!-- Registration Number Input -->
							<input type="text" id="contact_form_number" class="contact_form_subject input_field" placeholder="Registration Number (e.g. GJ-01-XX-1234)" name="number" required style="margin-bottom: 20px;">

							<!-- Price Per Day Input -->
							<input type="number" id="contact_form_price" class="contact_form_subject input_field" placeholder="Rent Price Per Day ($)" name="price" required style="margin-bottom: 20px;">

							<!-- Routes Input -->
							<input type="text" id="contact_form_routes" class="contact_form_subject input_field" placeholder="Operational Routes (e.g. Ahmedabad - Vadodara - Surat)" name="routes" required style="margin-bottom: 25px;">

							<!-- Car Image Input -->
							<div style="margin-bottom: 30px; text-align: left;">
								<label for="car_image" style="color: white; font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px;">Car Image (Optional):</label>
								<input type="file" id="car_image" class="contact_form_subject input_field" name="image" accept="image/*" style="padding-top: 10px; border-bottom: none;">
							</div>

							<!-- Submit Button -->
							<button type="submit" id="form_submit_button" class="form_submit_button button trans_200" style="margin-top: 10px;">Register Car<span></span><span></span><span></span></button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

{% endblock %}
